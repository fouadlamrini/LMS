version: "3.9"

services:
  api:
    container_name: lms_api
    build: ./apps/api
    env_file:
      - ./apps/api/.env.production
    ports:
      - "3001:3001"
    volumes:
      - lms_uploads:/app/uploads
    restart: unless-stopped
    networks:
      - lms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    container_name: lms_web
    build: ./apps/web
    env_file:
      - ./apps/web/.env.production
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - lms_network
    depends_on:
      - api

networks:
  lms_network:
    driver: bridge

volumes:
  lms_uploads: